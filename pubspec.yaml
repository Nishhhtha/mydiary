name: mydiary
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # IndexedDB wrapper — replaces isar, isar_flutter_libs, path_provider
